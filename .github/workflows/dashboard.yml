name: Download, Build and Deploy
on:
 push:
  branches: ["main", "dashboard-experiments"]
 pull_request:
  branches: ["main"]
 schedule:
  - cron: "0 5 * * 1"

permissions:
 contents: read
 pages: write
 id-token: write

concurrency:
 group: "pages"
 cancel-in-progress: false

jobs: 
  download:
    runs-on: ubuntu-latest
    steps:
    - name: Checkpout repo
      uses: actions/checkout@v6
    
    - name: Install Minio client
      run: |
       wget https://dl.min.io/client/mc/release/linux-amd64/mc
       chmod +x mc
       sudo mv mc /usr/local/bin
    
    - name: Configure Minio client
      shell: bash
      env:
       HOSTNAME: ${{ secrets.MINIO_HOSTNAME }}
       ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
       SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      run: |
       mc alias set myminio $HOSTNAME $ACCESS_KEY $SECRET_KEY
    
    - name: Download data from bucket
      run: |
       mkdir -p gripiradar-ut-ee/{weekly,intake,vaccination,assets}
       # Full copies: intake (needed for older participants still active) and assets
       mc cp --recursive myminio/gripiradar-ut-ee/assets/ ./gripiradar-ut-ee/assets/
       mc cp --recursive myminio/gripiradar-ut-ee/intake/ ./gripiradar-ut-ee/intake/
       # Last ~6 months only: weekly and vaccination data files
       mc cp --recursive --newer-than "26w" myminio/gripiradar-ut-ee/weekly/ ./gripiradar-ut-ee/weekly/
       mc cp --recursive --newer-than "26w" myminio/gripiradar-ut-ee/vaccination/ ./gripiradar-ut-ee/vaccination/
       # Always include catalog/survey_info regardless of age
       mc cp myminio/gripiradar-ut-ee/weekly/catalog.json ./gripiradar-ut-ee/weekly/
       mc cp myminio/gripiradar-ut-ee/weekly/survey_info.json ./gripiradar-ut-ee/weekly/
       mc cp myminio/gripiradar-ut-ee/vaccination/catalog.json ./gripiradar-ut-ee/vaccination/
       mc cp myminio/gripiradar-ut-ee/vaccination/survey_info.json ./gripiradar-ut-ee/vaccination/
    
    - uses: actions/upload-artifact@v7
      with:
        name: 'gripiradar-ut-ee'
        path: 'gripiradar-ut-ee'
  
  build:
    runs-on: ubuntu-latest
    needs: download
    steps:
    - name: Checkpout repo
      uses: actions/checkout@v5
    
    - uses: actions/download-artifact@v8
      with:
        name: 'gripiradar-ut-ee'
        path: 'gripiradar-ut-ee'

    - name: Regenerate survey info CSVs from JSON schemas
      run: |
       python3 scripts/import_survey_info.py

    - name: Pull image
      run: |
       docker pull taavipall/gripiradar:latest

    - name: Run quarto
      run: |
       docker run -v $(pwd):/workspace -w /workspace taavipall/gripiradar \
        quarto render index.qmd --output-dir public
     
    - name: Upload
      id: deployment
      uses: actions/upload-pages-artifact@v5
      with:
       path: 'public'
  
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
